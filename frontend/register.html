<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Dolphin | Startup OS</title>
    <link rel="stylesheet" href="./css/register.css">
</head>
<body>
    <div class="register-container">
        <!-- Left side - Image -->
        <div class="image-section">
            <div class="image-overlay">
                <div class="logo-large">Dolphin</div>
                <div class="tagline">Startup OS</div>
            </div>
        </div>

        <!-- Right side - Form -->
        <div class="form-section">
            <h2>Join Dolphin</h2>
            <p class="subtitle">Initialize your startup journey</p>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email address" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <div class="password-input-container">
                        <input type="password" id="password" placeholder="Create a secure password" required>
                        <button type="button" id="toggle-password" class="toggle-password">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-slash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Role Selection -->
                <div class="role-selector">
                    <div class="role-label">I am a...</div>
                    <div class="role-buttons">
                        <button type="button" class="role-btn active" data-role="founder">
                            <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>
                                <path d="M12 6v6l4 2"></path>
                            </svg>
                            <span>Founder</span>
                        </button>
                        <button type="button" class="role-btn" data-role="investor">
                            <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 3v18h18"></path>
                                <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"></path>
                            </svg>
                            <span>Investor</span>
                        </button>
                        <button type="button" class="role-btn" data-role="provider">
                            <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                                <line x1="12" y1="22.08" x2="12" y2="12"></line>
                            </svg>
                            <span>Provider</span>
                        </button>
                    </div>
                    <!-- Hidden input to store selected role -->
                    <input type="hidden" id="selected-role" name="role" value="founder">
                </div>
                
                <button type="submit" class="btn">Create Account</button>
            </form>
            
            <div class="footer-text">
                Already have an account? <a href="login.html">Login here</a>
            </div>
            
            <!-- Google Login Button -->
            <div class="google-login-container">
                <div class="divider">or</div>
                <button id="google-login-btn" class="google-btn">
                    <svg class="google-icon" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
            </div>
        </div>
    </div>
    
    <!-- Include API Client -->
    <script src="./js/api.js"></script>
    
    <script>
        // Role selection functionality
        const roleButtons = document.querySelectorAll('.role-btn');
        const selectedRoleInput = document.getElementById('selected-role');
        
        // Set default role
        let selectedRole = 'founder';
        
        // Handle role button clicks
        roleButtons.forEach(button => {
            button.addEventListener('click', () => {
                // Remove active class from all buttons
                roleButtons.forEach(btn => btn.classList.remove('active'));
                
                // Add active class to clicked button
                button.classList.add('active');
                
                // Update selected role
                selectedRole = button.dataset.role;
                
                // Update hidden input value
                selectedRoleInput.value = selectedRole;
                
                console.log('Selected role:', selectedRole);
            });
        });
        
        // Password toggle functionality
        const passwordInput = document.getElementById('password');
        const togglePasswordBtn = document.getElementById('toggle-password');
        const eyeIcon = togglePasswordBtn.querySelector('.eye-icon');
        const eyeSlashIcon = togglePasswordBtn.querySelector('.eye-slash-icon');
        
        togglePasswordBtn.addEventListener('click', () => {
            // Toggle the type attribute
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Toggle icon visibility
            if (type === 'password') {
                eyeIcon.style.display = 'block';
                eyeSlashIcon.style.display = 'none';
            } else {
                eyeIcon.style.display = 'none';
                eyeSlashIcon.style.display = 'block';
            }
        });
        
        // Form submission handler
        const registerForm = document.getElementById('register-form');
        
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = selectedRoleInput.value;
            
            // Validate inputs
            if (!name || !email || !password || !role) {
                alert('All fields are required');
                return;
            }
            
            if (password.length < 8) {
                alert('Password must be at least 8 characters long');
                return;
            }
            
            // Show loading state
            const submitButton = registerForm.querySelector('.btn');
            const originalButtonText = submitButton.textContent;
            submitButton.textContent = 'Creating Account...';
            submitButton.disabled = true;
            
            try {
                // Call the backend API
                const data = await api.register(name, email, password, role);
                
                // Redirect based on role
                if (role === 'investor') {
                    window.location.href = 'investor-dashboard.html';
                } else if (role === 'founder') {
                    window.location.href = 'dashboard.html';
                } else if (role === 'provider') {
                    window.location.href = 'provider-dashboard.html';
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert(`Registration failed: ${error.message}`);
            } finally {
                // Reset button state
                submitButton.textContent = originalButtonText;
                submitButton.disabled = false;
            }
        });
        
        // Google login button
        const googleLoginBtn = document.getElementById('google-login-btn');
        googleLoginBtn.addEventListener('click', () => {
            // Redirect to backend endpoint for Google OAuth
            window.location.href = 'http://localhost:5000/api/auth/google';
        });
    </script>
</body>
</html>
