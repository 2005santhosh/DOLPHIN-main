<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Dolphin | Startup OS</title>
    <link rel="stylesheet" href="./css/register.css">
</head>
<body>
    <div class="register-container">
        <!-- Left side - Branding Header -->
        <div class="image-section">
            <div class="image-overlay">
                <div class="logo-large">Dolphin</div>
                <div class="tagline">Startup OS</div>
            </div>
        </div>

        <!-- Right side - Form -->
        <div class="form-section">
            <h2>Join Dolphin</h2>
            <p class="subtitle">Initialize your startup journey</p>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email address" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Create Password</label>
                    <div class="password-input-container">
                        <input type="password" id="password" placeholder="Create a secure password" required>
                        <button type="button" id="toggle-password" class="toggle-password" aria-label="Toggle password">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-slash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- Role Selection -->
                <div class="role-selector">
                    <div class="role-label">I am a...</div>
                    <div class="role-buttons">
                        <button type="button" class="role-btn active" data-role="founder">
                            <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"></path>
                                <path d="M12 6v6l4 2"></path>
                            </svg>
                            <span>Founder</span>
                        </button>
                        <button type="button" class="role-btn" data-role="investor">
                            <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 3v18h18"></path>
                                <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"></path>
                            </svg>
                            <span>Investor</span>
                        </button>
                        <button type="button" class="role-btn" data-role="provider">
                            <svg class="role-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                                <line x1="12" y1="22.08" x2="12" y2="12"></line>
                            </svg>
                            <span>Provider</span>
                        </button>
                    </div>
                    <input type="hidden" id="selected-role" name="role" value="founder">
                </div>
                
                <button type="submit" class="btn">Create Account</button>
            </form>
            
            <div class="footer-text">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>
    
    <script src="./js/register.js"></script>
    
</body>
</html>
