<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Dolphin</title>
    <style>
        /* Light theme: Refined for professionalism */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --primary: #38bdf8; --secondary: #f8fafc; --card-bg: #ffffff; --text: #0f172a; --border: rgba(0,0,0,0.1); }
        body { font-family: 'Inter', sans-serif; background-color: var(--secondary); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; position: relative; }
       
        /* Animated Background Blob - subtle */
        body::before { content:''; position: absolute; width: 500px; height: 500px; background: #6366f1; filter: blur(150px); opacity: 0.1; border-radius: 50%; bottom: -100px; right: -100px; z-index: -1; animation: pulse 5s infinite; }
       
        .auth-container { background: var(--card-bg); padding: 40px; border-radius: 20px; width: 450px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
       
        h2 { text-align: center; margin-bottom: 10px; font-weight: 700; }
        .subtitle { text-align: center; color: #475569; font-size: 0.9rem; margin-bottom: 30px; }
       
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1); }
        /* Role Selector - Pill buttons like image */
        .role-selector { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .role-card { padding: 8px 20px; text-align: center; border-radius: 50px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; background: #fff; border: 1px solid var(--border); color: #475569; }
        .role-card:hover { border-color: var(--primary); }
        .role-card.selected { background: var(--primary); border-color: var(--primary); color: #fff; font-weight: bold; }
        .hidden-radio { display: none; }
       
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #6366f1); border: none; border-radius: 8px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.5); }
       
        .footer-text { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #475569; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Join Dolphin</h2>
        <p class="subtitle">Initialize your startup journey</p>
       
        <form id="register-form">
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Create Password" required>
           
            <label style="font-size:0.8rem; color:#475569; margin-bottom:10px; display:block; text-align:center;">I am a...</label>
            <div class="role-selector">
                <label class="role-card selected" data-role="founder">
                    <input type="radio" name="role" value="founder" class="hidden-radio" checked> Founder
                </label>
                <label class="role-card" data-role="investor">
                    <input type="radio" name="role" value="investor" class="hidden-radio"> Investor
                </label>
                <label class="role-card" data-role="provider">
                    <input type="radio" name="role" value="provider" class="hidden-radio"> Provider
                </label>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="footer-text">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>
    <script src="js/register.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
