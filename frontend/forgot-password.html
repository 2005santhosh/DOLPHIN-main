<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Dolphin</title>
    <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐬</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* DESIGN TOKENS */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --bg-white: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --error: #ef4444;
            --success: #10b981;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-body);
            color: var(--text-secondary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        .header {
            padding: 1.5rem;
            text-align: center;
        }

        .logo-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo-icon { font-size: 1.75rem; }
        .logo-text { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.025em; }

        /* MAIN CONTAINER */
        .main-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            width: 100%;
        }

        /* AUTH CARD */
        .auth-card {
            background-color: var(--bg-white);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
        }

        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background-color: #eef2ff;
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .card-subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        /* FORM ELEMENTS */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: var(--font-sans);
            color: var(--text-primary);
            background-color: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-input.error {
            border-color: var(--error);
        }

        .error-message {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            display: none;
        }

        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }

        /* SPINNER */
        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 2px solid white;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* FOOTER LINK */
        .footer-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
        }
        .footer-link:hover { text-decoration: underline; }

        /* SUCCESS STATE */
        .success-view {
            display: none;
            text-align: center;
        }

        .success-icon {
            width: 48px;
            height: 48px;
            background-color: #ecfdf5;
            color: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
                border-radius: 0;
                border: none;
                box-shadow: none;
                background: transparent;
            }
            body { background-color: var(--bg-white); }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <a href="index.html" class="logo-link">
            <span class="logo-icon">🐬</span>
            <span class="logo-text">Dolphin</span>
        </a>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <div class="auth-card">
            
            <!-- Initial Form View -->
            <div id="form-view">
                <div class="card-header">
                    <div class="card-icon">
                        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                        </svg>
                    </div>
                    <h1 class="card-title">Forgot password?</h1>
                    <p class="card-subtitle">No worries, we'll send you reset instructions.</p>
                </div>

                <form id="forgot-password-form">
                    <div class="form-group">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email address" required>
                        <div class="error-message" id="error-msg">Please enter a valid email address.</div>
                    </div>

                    <button type="submit" class="btn-submit" id="submit-btn">
                        <div class="spinner" id="spinner"></div>
                        <span id="btn-text">Reset Password</span>
                    </button>
                </form>

                <a href="login.html" class="footer-link">← Back to Login</a>
            </div>

            <!-- Success View (Hidden by default) -->
            <div id="success-view" class="success-view">
                <div class="success-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h2 class="card-title">Check your email</h2>
                <p class="card-subtitle" style="margin-bottom: 1.5rem;">We have sent a password reset link to <strong id="email-display" style="color: var(--text-primary);"></strong>.</p>
                <p class="card-subtitle" style="font-size: 0.8rem; margin-top: 1rem;">
                    Didn't receive the email? Check your spam folder or 
                    <a href="#" onclick="resetForm()" style="color: var(--primary); font-weight: 500;">try again</a>.
                </p>
            </div>

        </div>
    </main>

    <script>
        const API_URL = 'https://api.dolphinorg.in/api';
        const form = document.getElementById('forgot-password-form');
        const emailInput = document.getElementById('email');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btn-text');
        const submitBtn = document.getElementById('submit-btn');
        const formView = document.getElementById('form-view');
        const successView = document.getElementById('success-view');
        const emailDisplay = document.getElementById('email-display');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();

            // Reset error state
            emailInput.classList.remove('error');
            errorMsg.style.display = 'none';

            if (!email) {
                emailInput.classList.add('error');
                errorMsg.textContent = "Email is required.";
                errorMsg.style.display = 'block';
                return;
            }

            // UI Loading State
            submitBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = 'Sending...';

            try {
                // API Call to your backend
                const response = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                // Note: For security, it's best practice to always show the success message
                // even if the email doesn't exist in your DB (prevents email enumeration).
                // So we treat 200, 404, and 422 similarly for the UI.

                if (response.ok || response.status === 404 || response.status === 422) {
                    // Show Success View
                    emailDisplay.textContent = email;
                    formView.style.display = 'none';
                    successView.style.display = 'block';
                } else {
                    // Handle server errors (500, etc)
                    const data = await response.json();
                    throw new Error(data.message || 'Something went wrong. Please try again.');
                }

            } catch (err) {
                console.error(err);
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                emailInput.classList.add('error');
                
                // Reset Button
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Reset Password';
            }
        });

        function resetForm() {
            formView.style.display = 'block';
            successView.style.display = 'none';
            submitBtn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'Reset Password';
            emailInput.value = '';
        }
    </script>
</body>
</html>
