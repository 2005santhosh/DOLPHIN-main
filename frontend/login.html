<!-- frontend/login.html (Updated: More professional - aligned with register) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dolphin</title>
    <style>
        /* Aligned with register for consistency */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --primary: #38bdf8; --secondary: #f8fafc; --card-bg: #ffffff; --text: #0f172a; --border: rgba(0,0,0,0.1); }
        body { font-family: 'Inter', sans-serif; background-color: var(--secondary); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; position: relative; }
        body::before { content:''; position: absolute; width: 400px; height: 400px; background: var(--primary); filter: blur(150px); opacity: 0.15; border-radius: 50%; top: -100px; left: -100px; z-index: -1; animation: pulse 5s infinite; }
        .auth-container { background: var(--card-bg); padding: 40px; border-radius: 20px; width: 400px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        h2 { text-align: center; margin-bottom: 10px; font-weight: 700; letter-spacing: -0.5px; }
        .subtitle { text-align: center; color: #475569; font-size: 0.9rem; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #6366f1); border: none; border-radius: 8px; color: white; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(56, 189, 248, 0.5); }
        .footer-text { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #475569; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-text a:hover { text-decoration: underline; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.25; } }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to access your dashboard</p>
        
        <form id="login-form">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="footer-text">
            Don't have an account? <a href="register.html">Join Dolphin</a>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
