<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dolphin | Startup OS</title>
    <link rel="stylesheet" href="./css/login.css">
    <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐬</text></svg>">

</head>
<body>
    <div class="login-container">
        <!-- Left side - Branding -->
        <div class="branding">
            <div class="logo">Dolphin</div>
            <div class="tagline">The Operating System For Entrepreneurship</div>
            
            <div class="features">
                <div class="feature-item">
                    <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"></path>
                        <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                    </svg>
                    <div class="feature-text">Structured Validation</div>
                </div>
                
                <div class="feature-item">
                    <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"></path>
                    </svg>
                    <div class="feature-text">Investor Access</div>
                </div>
                
                <div class="feature-item">
                    <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                    </svg>
                    <div class="feature-text">Vetted Resources</div>
                </div>
            </div>
        </div>

        <!-- Right side - Login Form -->
        <div class="login-form-container">
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to access your dashboard</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-container">
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <button type="button" id="toggle-password" class="toggle-password" aria-label="Toggle password visibility">
                            <!-- Eye Icon (Visible by default) -->
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <!-- Eye Slash Icon (Hidden by default) -->
                            <svg class="eye-slash-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn">Sign In</button>

                <!-- Moved Forgot Password Link Here -->
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="forgot-password.html" style="font-size: 0.9rem; color: #6b7280; text-decoration: none; font-weight: 500;">
                        Forgot password?
                    </a>
                </div>
            </form>
            
            <div class="footer-text">
                Don't have an account? <a href="register.html">Join Dolphin</a>
            </div>
        </div>
    </div>
    
    <!-- Include API Client if needed -->
    <script src="./js/api.js?v=2"></script>
    <script src="./js/login.js?v=2"></script>
</body>
</html>
