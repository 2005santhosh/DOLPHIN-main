<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Dolphin</title>
    <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐬</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Same CSS styles as forgot-password.html for consistency */
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca; --bg-body: #f8fafc;
            --bg-white: #ffffff; --text-primary: #111827; --text-secondary: #6b7280;
            --border-color: #e5e7eb; --error: #ef4444; --success: #10b981;
            --font-sans: 'Inter', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background-color: var(--bg-body); color: var(--text-secondary); display: flex; flex-direction: column; min-height: 100vh; }
        .header { padding: 1.5rem; text-align: center; }
        .logo-link { display: inline-flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--text-primary); }
        .logo-icon { font-size: 1.75rem; }
        .logo-text { font-size: 1.5rem; font-weight: 700; }
        .main-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem; }
        .auth-card { background-color: var(--bg-white); width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid var(--border-color); }
        .card-header { text-align: center; margin-bottom: 2rem; }
        .card-title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); margin-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-primary); margin-bottom: 0.5rem; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border-color); border-radius: 0.5rem; font-size: 1rem; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .btn-submit { width: 100%; padding: 0.875rem; background-color: var(--primary); color: white; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-msg { color: var(--error); font-size: 0.8rem; margin-top: 0.5rem; text-align: center; display: none; }
        .success-msg { color: var(--success); font-size: 0.9rem; text-align: center; display: none; }
        .footer-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 0.95rem; color: var(--primary); font-weight: 500; text-decoration: none; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="logo-link">
            <span class="logo-icon">🐬</span>
            <span class="logo-text">Dolphin</span>
        </a>
    </header>

    <main class="main-container">
        <div class="auth-card">
            <div class="card-header">
                <h1 class="card-title">Reset Password</h1>
                <p style="color: var(--text-secondary);">Enter your new password below.</p>
            </div>

            <form id="reset-form">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min 8 characters" required minlength="8">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirm-password" class="form-input" placeholder="Confirm password" required>
                </div>

                <div id="error-msg" class="error-msg"></div>
                <div id="success-msg" class="success-msg"></div>

                <button type="submit" class="btn-submit">Update Password</button>
            </form>
            <a href="login.html" class="footer-link">Back to Login</a>
        </div>
    </main>

    <script>

        const API_URL = 'https://api.dolphinorg.in/api';
        const form = document.getElementById('reset-form');
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token'); // Extract token from URL

        if (!token) {
            document.getElementById('error-msg').textContent = 'Invalid or missing reset token.';
            document.getElementById('error-msg').style.display = 'block';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorEl = document.getElementById('error-msg');
            const successEl = document.getElementById('success-msg');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (password !== confirmPassword) {
                errorEl.textContent = 'Passwords do not match';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/reset-password/${token}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (response.ok) {
                    successEl.textContent = 'Password updated successfully! Redirecting to login...';
                    successEl.style.display = 'block';
                    form.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorEl.textContent = data.message || 'Failed to reset password';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
