<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dolphin • Investor Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --primary: #38bdf8;
      --primary-dark: #0ea5e9;
      --accent: #6366f1;
      --text: #0f172a;
      --text-secondary: #475569;
      --success: #10b981;
      --warning: #f59e0b;
      --border: rgba(0,0,0,0.08);
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
      --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
      --radius: 16px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(56,189,248,0.08) 0%, transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(99,102,241,0.06) 0%, transparent 35%);
      background-attachment: fixed;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 72px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      padding: 0 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }

    .logo { font-size:1.4rem; font-weight:700; background: linear-gradient(90deg,#000,var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--text-secondary);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .logout-btn:hover { background:rgba(0,0,0,0.08); border-color:var(--text); color:#000; }

    .sidebar {
      position: fixed;
      top: 72px; left: 0; bottom: 0;
      width: 260px;
      background: rgba(255,255,255,0.4);
      border-right: 1px solid var(--border);
      padding: 2rem 1rem;
      overflow-y: auto;
    }

    .nav-link {
      display: flex; align-items: center;
      padding: 12px 1rem; margin-bottom: 0.5rem;
      border-radius: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: var(--transition);
    }
    .nav-link:hover, .nav-link.active { background: var(--surface-2); color: var(--primary); }

    .nav-icon { width:20px; height:20px; margin-right:12px; fill:currentColor; }

    .main-content {
      margin-left: 260px;
      padding: 100px 3rem 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: var(--shadow-md);
      margin-bottom: 2rem;
    }

    h2, h3 { font-weight:600; margin-bottom:1rem; }
    .subtitle { color:var(--text-secondary); margin-bottom:1.5rem; line-height:1.5; }

    .request-item {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .request-item:last-child { border-bottom: none; }
    .request-item:hover { background: var(--surface-2); }

    .status-pending  { color: var(--warning); font-weight:500; }
    .status-accepted { color: var(--success);  font-weight:500; }
    .status-rejected { color: #ef4444;      font-weight:500; }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      border: none;
    }
    .btn-accept { background: var(--success); color: white; }
    .btn-accept:hover { background: #059669; }
    .btn-reject  { background: #ef4444; color: white; }
    .btn-reject:hover  { background: #dc2626; }
    
    .startup-card {
      padding: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1rem;
      transition: var(--transition);
    }
    .startup-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    .score-high   { color: var(--success); font-weight:700; }
    .score-medium { color: var(--warning); font-weight:600; }
    .score-low    { color: #ef4444;     font-weight:500; }
    
    .error-message {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      padding: 12px;
      border-radius: 8px;
      margin: 1rem 0;
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Dolphin • Investor</div>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </header>

  <nav class="sidebar">
    <a href="#" class="nav-link active">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      Dashboard
    </a>
    <a href="marketplace.html" class="nav-link">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
      Validated Startups
    </a>
    <a href="#" class="nav-link">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
      Watchlist
    </a>
  </nav>

  <main class="main-content">
    <div class="card">
      <h2>Investor Dashboard</h2>
      <p class="subtitle">Browse high-potential startups that have reached validation thresholds.</p>
      <div id="auth-error" class="error-message"></div>
    </div>

    <div class="card">
      <h3>Validated Startups (Score ≥ 70%)</h3>
      <div style="margin:1rem 0;">
        <input type="text" id="search-startup" placeholder="Search by name or thesis..." style="width:100%; padding:12px; border:1px solid var(--border); border-radius:8px;">
      </div>
      <div id="validated-startups"></div>
    </div>

    <div class="card">
      <h3>Quick Stats</h3>
      <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:1.5rem; margin-top:1rem;">
        <div style="padding:1rem; background:var(--surface-2); border-radius:12px; text-align:center;">
          <div style="font-size:1.8rem; font-weight:700; color:var(--primary);">24</div>
          <div style="color:var(--text-secondary);">Validated Startups</div>
        </div>
        <div style="padding:1rem; background:var(--surface-2); border-radius:12px; text-align:center;">
          <div style="font-size:1.8rem; font-weight:700; color:var(--success);">≥ 85%</div>
          <div style="color:var(--text-secondary);">Highest Score</div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    // Helper functions
    function getUser() {
      try {
        const user = localStorage.getItem('user');
        return user ? JSON.parse(user) : null;
      } catch (error) {
        console.error('Error parsing user data from localStorage:', error);
        localStorage.removeItem('user');
        return null;
      }
    }

    function isAuthenticated() {
      return !!localStorage.getItem('token');
    }

    async function logout() {
      try {
        const token = localStorage.getItem('token');
        if (token) {
          await fetch('http://localhost:5000/api/auth/logout', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          }).catch(err => {
            console.warn('Server logout failed, proceeding client-side:', err);
          });
        }
      } catch (err) {
        console.error('Logout process error:', err);
      }

      localStorage.removeItem('user');
      localStorage.removeItem('token');
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // Add event listener for logout button
    document.addEventListener('DOMContentLoaded', () => {
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', logout);
      }
      
      const user = getUser();
      const currentPath = window.location.pathname.toLowerCase();
      const currentPage = currentPath.split('/').pop().replace('.html', '');

      // If not authenticated, redirect
      if (!isAuthenticated()) {
        if (currentPage === 'investor-dashboard') {
          window.location.href = 'index.html';
        }
        return;
      }

      // Check role
      if (currentPage === 'investor-dashboard' && user.role !== 'investor') {
        window.location.href = 'index.html';
      }

      // Load dashboard
      loadInvestorDashboard();
    });

    async function loadInvestorDashboard() {
      try {
        const startups = await api.getValidatedStartups();

        const container = document.getElementById('validated-startups');
        const errorEl = document.getElementById('auth-error');
        
        if (!container) return;

        container.innerHTML = '';
        errorEl.style.display = 'none';

        if (!startups || startups.length === 0) {
          container.innerHTML = '<p style="color:var(--text-secondary);">No validated startups available yet.</p>';
          return;
        }

        startups.forEach(s => {
          const card = document.createElement('div');
          card.className = 'startup-card';
          const scoreClass = s.validationScore >= 85 ? 'score-high' : s.validationScore >= 70 ? 'score-medium' : 'score-low';

          card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <strong style="font-size:1.1rem;">${s.name}</strong>
              <span class="${scoreClass}">${s.validationScore}%</span>
            </div>
            <p style="margin:0.5rem 0; color:var(--text-secondary);">
              ${s.thesis?.substring(0, 120)}${s.thesis?.length > 120 ? '...' : ''}
            </p>
            <small style="color:var(--text-secondary);">Industry: ${s.industry || 'Not specified'}</small>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        console.error('Failed to load validated startups:', err);
        const container = document.getElementById('validated-startups');
        const errorEl = document.getElementById('auth-error');
        
        if (container) {
          container.innerHTML = '<p style="color:red;">Failed to load startups.</p>';
        }
        
        errorEl.textContent = 'Authentication error or server issue. Please try again.';
        errorEl.style.display = 'block';
      }
    }

    // Search filter
    document.getElementById('search-startup')?.addEventListener('input', e => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.startup-card').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(term) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
