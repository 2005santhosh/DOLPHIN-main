<!-- frontend/marketplace.html (Updated: Light theme, dynamic rendering, investor view) -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketplace - Dolphin</title>
    <style>
        /* Light theme: Inverted colors */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --primary: #38bdf8; --secondary: #f8fafc; --card-bg: #ffffff; --text: #0f172a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--secondary); color: var(--text); margin: 0; }
        header { background: rgba(255,255,255,0.95); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, #000, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); border-radius: 16px; padding: 30px; transition: 0.3s; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 40px rgba(56,189,248,0.3); }
        .card::before { content:''; position: absolute; top:0; left:0; width:4px; height:100%; background: var(--primary); opacity:0; transition:0.3s; }
        .card:hover::before { opacity:1; }
        h3 { margin-bottom: 10px; color: var(--text); }
        p { color: #475569; margin-bottom: 20px; font-size: 0.95rem; }
        .btn { display: block; width: 100%; padding: 12px; background: rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); color: var(--text); text-align: center; border-radius: 8px; text-decoration: none; font-weight: 600; transition: 0.2s; cursor: pointer; }
        .btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        .btn-back { display: inline-block; width: auto; margin-bottom: 20px; padding: 8px 16px; font-size: 0.9rem; }
        .verified { background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div class="logo">Dolphin</div>
        <div style="font-size: 0.9rem; color: #475569;">Logged in as <span id="user-role">User</span></div>
    </header>

    <div class="container">
        <a href="dashboard.html" class="btn btn-back">← Back to Dashboard</a>
        
        <h1 id="marketplace-title" style="margin-bottom: 10px;">Vetted Service Providers</h1>
        <p style="margin-bottom: 40px;">High-intent partners for validated startups.</p>

        <div class="grid" id="providers-grid">
            <!-- Dynamically injected -->
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
    // Auth Guard: Run immediately before DOM renders
    (function() {
        const token = localStorage.getItem('token');
        // If no token found, kick user to index immediately
        if (!token) {
            window.location.replace('index.html');
        }
    })();
    </script>
</body>
</html>
